name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 1,4' # Runs every Monday and Thursday at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually from GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/questions?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
